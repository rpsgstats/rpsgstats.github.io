<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RPSG Stats</title>

<link rel="stylesheet" href="style.css">

<script defer src="players.js"></script>
<script defer src="script.js"></script>

</head>

<body>

<!-- BACKGROUND GLOW -->
<div class="bg-glow"></div>

<!-- TOP BAR -->
<div class="top-bar">

    <div class="logo">
        RPSG
    </div>

    <input
    type="text"
    id="search"
    class="search"
    placeholder="Search players...">

</div>

<!-- HERO -->
<div class="hero">

    <h1>
        RPSG Player Stats
    </h1>

    <p>
        Track ranks, goals, ratings, and player profiles.
    </p>

</div>

<!-- PLAYER SECTION -->
<div class="players-section">

    <h2 class="section-title">
        Players
    </h2>

    <div class="player-grid"
    id="playerGrid">

    </div>

</div>

</body>
</html>
