<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RPSG Player</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
padding:14px;
overflow-x:hidden;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.top-btn{
width:46px;
height:46px;
border-radius:50%;
background:#111;
border:1px solid rgba(255,255,255,0.05);
display:flex;
align-items:center;
justify-content:center;
color:#aaa;
cursor:pointer;
}

.site-name{
font-weight:bold;
font-size:20px;
}

/* MAIN CARD */

.profile-card{

max-width:700px;
margin:auto;

background:
linear-gradient(
180deg,
rgba(12,12,12,0.98),
rgba(5,5,5,1)
);

border-radius:34px;
padding:24px;

border:1px solid rgba(255,255,255,0.06);

box-shadow:

0 0 20px rgba(255,255,255,0.03),
0 0 60px rgba(80,120,255,0.03),

inset 0 1px 1px rgba(255,255,255,0.02);

backdrop-filter:blur(12px);
}

/* TOP */

.top{
display:flex;
align-items:flex-start;
gap:18px;
}

/* PFP */

.pfp{
width:86px;
height:86px;
border-radius:24px;
background:linear-gradient(145deg,#2a2a2a,#0f0f0f);
border:1px solid rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
color:white;
}

/* NAME */

.player-name{
font-size:38px;
font-weight:bold;
line-height:1;
margin-top:4px;
}

/* BRONZE TAG */

.rank{

display:inline-block;

margin-top:10px;

background:
linear-gradient(
145deg,
rgba(180,120,60,0.18),
rgba(90,55,25,0.14)
);

border:1px solid rgba(210,150,90,0.14);

color:#d6b08a;

padding:7px 14px;

border-radius:16px;

font-size:12px;
font-weight:600;

}

/* TAGS */

.tags{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:14px;
}

.tag{
background:#101010;
border:1px solid rgba(255,255,255,0.05);
padding:9px 13px;
border-radius:16px;
font-size:12px;
color:#888;
display:flex;
align-items:center;
gap:6px;
}

/* MAIN STATS */

.main-stats{
display:flex;
justify-content:space-between;
margin-top:28px;
padding-top:24px;
border-top:1px solid rgba(255,255,255,0.05);
}

.stat-title{
font-size:12px;
letter-spacing:1px;
color:#777;
}

.stat-big{
font-size:52px;
font-weight:bold;
margin-top:6px;
}

/* PROGRESS */

.progress-section{
margin-top:24px;
}

.progress-top{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.progress-title{
font-size:12px;
color:#777;
}

.progress-rank{
font-size:13px;
font-weight:bold;
color:white;
}

.progress-bar{
width:100%;
height:8px;
background:#161616;
border-radius:999px;
overflow:hidden;
margin-top:10px;
}

.progress-fill{
width:40%;
height:100%;
background:white;
border-radius:999px;
}

.progress-bottom{
display:flex;
justify-content:space-between;
margin-top:8px;
font-size:12px;
color:#666;
}

/* SHARE */

.share-btn{
margin-top:22px;
width:100%;
background:#111;
border:none;
padding:16px;
border-radius:18px;
color:white;
font-weight:bold;
font-size:15px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.05);
}

/* TABS */

.tabs{
display:flex;
justify-content:space-around;
margin-top:28px;
padding-top:20px;
border-top:1px solid rgba(255,255,255,0.05);
}

.tab{
color:#666;
font-size:14px;
font-weight:bold;
position:relative;
}

.active-tab{
color:white;
}

.active-tab::after{
content:"";
position:absolute;
bottom:-12px;
left:0;
width:100%;
height:2px;
background:white;
border-radius:999px;
}

/* GRID */

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:28px;
}

/* BOX */

.stat-box{

background:
linear-gradient(
180deg,
rgba(12,12,12,0.96),
rgba(5,5,5,1)
);

border-radius:24px;
padding:22px;

border:1px solid rgba(255,255,255,0.05);

box-shadow:
0 0 12px rgba(255,255,255,0.02);

transition:0.25s;
}

.stat-box:hover{

transform:translateY(-2px);

border-color:
rgba(255,255,255,0.08);

box-shadow:
0 0 20px rgba(255,255,255,0.04);

}

/* SMALL TITLE */

.stat-small{
font-size:12px;
color:#777;
letter-spacing:1px;
}

/* NUMBER */

.stat-number{
font-size:52px;
font-weight:800;
margin-top:10px;
line-height:1;
}

/* DESC */

.stat-desc{
margin-top:10px;
font-size:13px;
color:#777;
}

/* MOBILE */

@media(max-width:768px){

.player-name{
font-size:30px;
}

.pfp{
width:78px;
height:78px;
font-size:24px;
}

.stat-big{
font-size:42px;
}

.stat-number{
font-size:42px;
}

.stats-grid{
gap:12px;
}

}

</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

<div class="top-btn"
onclick="window.location.href='index.html'">

<i class="fa-solid fa-xmark"></i>

</div>

<div class="site-name">
rpsg.app
</div>

<div class="top-btn">
<i class="fa-solid fa-bars"></i>
</div>

</div>

<!-- PROFILE CARD -->
<div class="profile-card">

<!-- TOP -->
<div class="top">

<div class="pfp"
id="profilePic">
</div>

<div>

<div class="player-name"
id="playerName">
Loading...
</div>

<div class="rank"
id="playerRank">
Bronze I
</div>

<div class="tags">

<div class="tag">
<i class="fa-regular fa-futbol"></i>
Player
</div>

<div class="tag">
<i class="fa-solid fa-location-dot"></i>
NA
</div>

<div class="tag">
<i class="fa-regular fa-flag"></i>
RPSG
</div>

</div>

</div>

</div>

<!-- MAIN STATS -->
<div class="main-stats">

<div>

<div class="stat-title">
POINTS
</div>

<div class="stat-big"
id="points">
0
</div>

</div>

<div>

<div class="stat-title">
MARKET VALUE
</div>

<div class="stat-big"
id="value">
£0
</div>

</div>

</div>

<!-- PROGRESS -->
<div class="progress-section">

<div class="progress-top">

<div class="progress-title">
RANK PROGRESS
</div>

<div class="progress-rank">
20 pts to Bronze II
</div>

</div>

<div class="progress-bar">

<div class="progress-fill"
id="progressFill">
</div>

</div>

<div class="progress-bottom">

<div>0 pts</div>

<div>20 pts</div>

</div>

</div>

<!-- SHARE -->
<button
class="share-btn"
onclick="copyLink()">

<i class="fa-solid fa-link"></i>
Copy link to this card

</button>

<!-- TABS -->
<div class="tabs">

<div class="tab active-tab">
Profile
</div>

<div class="tab">
Stats
</div>

<div class="tab">
Clips
</div>

<div class="tab">
Career
</div>

</div>

<!-- STATS -->
<div class="stats-grid">

<div class="stat-box">

<div class="stat-small">
GOALS
</div>

<div class="stat-number"
id="goals">
0
</div>

<div class="stat-desc">
0 G+A combined
</div>

</div>

<div class="stat-box">

<div class="stat-small">
ASSISTS
</div>

<div class="stat-number"
id="assists">
0
</div>

<div class="stat-desc">
0 ast/goal ratio
</div>

</div>

<div class="stat-box">

<div class="stat-small">
CLEAN SHEETS
</div>

<div class="stat-number"
id="cleansheets">
0
</div>

<div class="stat-desc">
0 matches
</div>

</div>

<div class="stat-box">

<div class="stat-small">
ALL-TIME PTS
</div>

<div class="stat-number"
id="blocks">
0
</div>

<div class="stat-desc">
RPSG career
</div>

</div>

</div>

</div>

<script src="players.js"></script>

<script>

const params =
new URLSearchParams(window.location.search);

const playerName =
decodeURIComponent(
params.get("name") || "Unknown"
);

const player =
players[playerName] || {

rank:"Bronze I",
points:0,
goals:0,
assists:0,
blocks:0,
cleansheets:0,
value:"£0"

};

/* LOAD PLAYER */

document.getElementById("playerName")
.textContent = playerName;

document.getElementById("profilePic")
.textContent =
playerName.substring(0,2).toUpperCase();

document.getElementById("playerRank")
.textContent =
player.rank;

document.getElementById("points")
.textContent =
player.points;

document.getElementById("value")
.textContent =
player.value;

document.getElementById("goals")
.textContent =
player.goals;

document.getElementById("assists")
.textContent =
player.assists;

document.getElementById("blocks")
.textContent =
player.blocks;

document.getElementById("cleansheets")
.textContent =
player.cleansheets;

/* PROGRESS */

let progress =
(player.points / 20) * 100;

document.getElementById("progressFill")
.style.width =
progress + "%";

/* SHARE */

function copyLink(){

navigator.clipboard.writeText(
window.location.href
);

alert("Profile link copied!");

}

</script>

</body>
</html>
