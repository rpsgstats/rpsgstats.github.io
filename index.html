<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RPSG Player</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
padding:14px;
overflow-x:hidden;
}

/* BACK */

.back-btn{
display:inline-flex;
align-items:center;
gap:8px;
margin-bottom:16px;
color:#888;
text-decoration:none;
font-size:14px;
}

/* MAIN PLAYER CARD */

.profile-card{
max-width:700px;
margin:auto;
background:
linear-gradient(
180deg,
rgba(55,35,20,0.88),
rgba(18,12,8,0.96)
);
border-radius:34px;
padding:24px;
border:1px solid rgba(210,150,90,0.10);
box-shadow:
0 0 24px rgba(180,120,60,0.06),
inset 0 1px 1px rgba(255,255,255,0.02);
}

/* TOP */

.top{
display:flex;
align-items:flex-start;
gap:18px;
}

/* PFP */

.pfp{
width:86px;
height:86px;
border-radius:24px;
background:linear-gradient(135deg,#2b2b2b,#111);
border:1px solid rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
color:white;
}

/* NAME */

.player-name{
font-size:38px;
font-weight:bold;
line-height:1;
}

/* RANK */

.rank{
display:inline-block;
margin-top:10px;
background:linear-gradient(
145deg,
rgba(180,120,60,0.25),
rgba(90,55,25,0.18)
);
border:1px solid rgba(210,150,90,0.18);
color:#d6b08a;
padding:8px 14px;
border-radius:16px;
font-size:12px;
font-weight:600;
}

/* TAGS */

.tags{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:14px;
}

.tag{
background:#171717;
padding:9px 13px;
border-radius:16px;
font-size:12px;
color:#888;
display:flex;
align-items:center;
gap:6px;
}

/* MAIN STATS */

.main-stats{
display:flex;
justify-content:space-between;
margin-top:28px;
padding-bottom:20px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.stat-title{
font-size:11px;
letter-spacing:1px;
color:#b68f6b;
}

.stat-big{
font-size:46px;
font-weight:bold;
margin-top:6px;
}

/* PROGRESS */

.progress-section{
margin-top:20px;
}

.progress-top{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.progress-title{
font-size:12px;
color:#b68f6b;
}

.progress-rank{
font-size:13px;
font-weight:bold;
color:#d6b08a;
}

.progress-bar{
width:100%;
height:8px;
background:#2a1a10;
border-radius:999px;
overflow:hidden;
}

.progress-fill{
width:0%;
height:100%;
background:#d6b08a;
border-radius:999px;
}

/* SHARE */

.share-btn{
margin-top:20px;
width:100%;
background:#111;
border:none;
padding:16px;
border-radius:18px;
color:white;
font-weight:bold;
font-size:15px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.05);
transition:0.3s;
}

.share-btn:hover{
transform:translateY(-2px);
}

/* TABS */

.tabs{
display:flex;
justify-content:space-around;
margin-top:26px;
padding-top:20px;
border-top:1px solid rgba(255,255,255,0.05);
}

.tab{
color:#9f866d;
font-size:14px;
font-weight:bold;
position:relative;
}

.active-tab{
color:white;
}

.active-tab::after{
content:"";
position:absolute;
bottom:-12px;
left:0;
width:100%;
height:2px;
background:#d6b08a;
border-radius:999px;
}

/* STATS GRID */

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:26px;
}

/* STAT BOX */

.stat-box{
background:
linear-gradient(
180deg,
rgba(42,24,14,0.92),
rgba(18,10,6,0.95)
);
border-radius:24px;
padding:22px;
border:1px solid rgba(210,150,90,0.10);
}

.stat-small{
font-size:12px;
color:#c9a47d;
letter-spacing:1px;
}

.stat-number{
font-size:46px;
font-weight:bold;
margin-top:8px;
}

.stat-desc{
margin-top:10px;
font-size:13px;
color:#9e8368;
}

/* MOBILE */

@media(max-width:768px){

.player-name{
font-size:30px;
}

.pfp{
width:78px;
height:78px;
font-size:24px;
}

.stat-big{
font-size:38px;
}

.stat-number{
font-size:38px;
}

.stats-grid{
gap:12px;
}

}

</style>

</head>

<body>

<a href="index.html"
class="back-btn">

<i class="fa-solid fa-arrow-left"></i>
Back

</a>

<div class="profile-card">

<!-- TOP -->
<div class="top">

<div class="pfp"
id="profilePic">
</div>

<div>

<div class="player-name"
id="playerName">
Loading...
</div>

<div class="rank"
id="playerRank">
Bronze I
</div>

<div class="tags">

<div class="tag">
<i class="fa-solid fa-futbol"></i>
Player
</div>

<div class="tag">
<i class="fa-solid fa-location-dot"></i>
NA
</div>

<div class="tag">
<i class="fa-solid fa-trophy"></i>
RPSG
</div>

</div>

</div>

</div>

<!-- MAIN STATS -->
<div class="main-stats">

<div>

<div class="stat-title">
POINTS
</div>

<div class="stat-big"
id="points">
0
</div>

</div>

<div>

<div class="stat-title">
MARKET VALUE
</div>

<div class="stat-big"
id="value">
£0
</div>

</div>

</div>

<!-- PROGRESS -->
<div class="progress-section">

<div class="progress-top">

<div class="progress-title">
RANK PROGRESS
</div>

<div class="progress-rank">
20 pts to Bronze II
</div>

</div>

<div class="progress-bar">

<div class="progress-fill"
id="progressFill">
</div>

</div>

</div>

<!-- SHARE -->
<button
class="share-btn"
onclick="copyLink()">

<i class="fa-solid fa-link"></i>
Copy link to this card

</button>

<!-- TABS -->
<div class="tabs">

<div class="tab active-tab">
Profile
</div>

<div class="tab">
Stats
</div>

<div class="tab">
Clips
</div>

<div class="tab">
Career
</div>

</div>

<!-- STATS -->
<div class="stats-grid">

<div class="stat-box">

<div class="stat-small">
GOALS
</div>

<div class="stat-number"
id="goals">
0
</div>

<div class="stat-desc">
0 G+A combined
</div>

</div>

<div class="stat-box">

<div class="stat-small">
ASSISTS
</div>

<div class="stat-number"
id="assists">
0
</div>

<div class="stat-desc">
0 ast/goal ratio
</div>

</div>

<div class="stat-box">

<div class="stat-small">
CLEAN SHEETS
</div>

<div class="stat-number"
id="cleansheets">
0
</div>

<div class="stat-desc">
0 matches
</div>

</div>

<div class="stat-box">

<div class="stat-small">
ALL-TIME PTS
</div>

<div class="stat-number"
id="blocks">
0
</div>

<div class="stat-desc">
RPSG career
</div>

</div>

</div>

</div>

<script src="players.js"></script>

<script>

const params =
new URLSearchParams(window.location.search);

const playerName =
decodeURIComponent(
params.get("name") || "Unknown"
);

const player =
players[playerName] || {

rank:"Bronze I",
points:0,
goals:0,
assists:0,
blocks:0,
cleansheets:0,
value:"£0"

};

/* LOAD PLAYER */

document.getElementById("playerName")
.textContent = playerName;

document.getElementById("profilePic")
.textContent =
playerName.substring(0,2).toUpperCase();

document.getElementById("playerRank")
.textContent =
player.rank;

document.getElementById("points")
.textContent =
player.points;

document.getElementById("value")
.textContent =
player.value;

document.getElementById("goals")
.textContent =
player.goals;

document.getElementById("assists")
.textContent =
player.assists;

document.getElementById("blocks")
.textContent =
player.blocks;

document.getElementById("cleansheets")
.textContent =
player.cleansheets;

/* PROGRESS */

let progress =
(player.points / 20) * 100;

document.getElementById("progressFill")
.style.width =
progress + "%";

/* SHARE */

function copyLink(){

navigator.clipboard.writeText(
window.location.href
);

alert("Profile link copied!");

}

</script>

</body>
</html>
