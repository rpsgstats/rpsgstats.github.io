<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RPSG Stats</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
}

.container{
padding:25px 18px 120px;
max-width:700px;
margin:auto;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.top h1{
font-size:52px;
font-weight:bold;
}

.search-box{
margin-top:25px;
position:relative;
}

.search-icon{
position:absolute;
left:18px;
top:18px;
color:#666;
}

.search-box input{
width:100%;
background:#171717;
border:none;
border-radius:18px;
padding:18px 18px 18px 48px;
color:white;
font-size:16px;
outline:none;
}

.player-card{
background:#141414;
border-radius:28px;
padding:20px;
margin-top:18px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
transition:0.3s;
}

.player-card:hover{
transform:translateY(-4px);
}

.player-left{
display:flex;
align-items:center;
gap:16px;
}

.player-pfp{
width:64px;
height:64px;
border-radius:18px;
background:#222;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:22px;
}

.player-name{
font-size:20px;
font-weight:bold;
}

.player-row{
margin-top:6px;
display:flex;
gap:8px;
}

.rank{
background:#2a2a2a;
padding:4px 10px;
border-radius:14px;
font-size:12px;
color:#aaa;
}

.position{
color:#777;
font-size:14px;
}

.player-stats{
margin-top:7px;
color:#777;
font-size:13px;
}

.points{
font-size:28px;
font-weight:bold;
}

.pts{
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<div class="top">
<h1>Roster</h1>
</div>

<div class="search-box">

<i class="fa-solid fa-magnifying-glass search-icon"></i>

<input
type="text"
id="search"
placeholder="Search players...">

</div>

<div id="playerList"></div>

</div>

<script src="players.js"></script>

<script>

const playerList =
document.getElementById("playerList");

Object.keys(players).forEach(player => {

const data = players[player];

const initials =
player.substring(0,2).toUpperCase();

playerList.innerHTML += `

<div class="player-card"
onclick="window.location.href='player.html?name=${encodeURIComponent(player)}'">

<div class="player-left">

<div class="player-pfp">
${initials}
</div>

<div>

<div class="player-name">
${player}
</div>

<div class="player-row">

<div class="rank">
${data.rank}
</div>

<div class="position">
${data.position}
</div>

</div>

<div class="player-stats">
${data.goals}G •
${data.assists}A •
${data.blocks}B •
${data.cleansheets}CS
</div>

</div>

</div>

<div>

<div class="points">
${data.points}
</div>

<div class="pts">
PTS
</div>

</div>

</div>

`;

});

document.getElementById("search")
.addEventListener("input",e=>{

let value =
e.target.value.toLowerCase();

let cards =
document.querySelectorAll(".player-card");

cards.forEach(card=>{

let name =
card.querySelector(".player-name")
.innerText.toLowerCase();

if(name.includes(value)){
card.style.display="flex";
}
else{
card.style.display="none";
}

});

});

</script>

</body>
</html>
