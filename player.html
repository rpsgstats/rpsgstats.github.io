<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RPSG Player</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
padding:20px;
}

/* MAIN CARD */

.profile-card{
max-width:700px;
margin:auto;
background:linear-gradient(180deg,#111,#0b0b0b);
border-radius:34px;
padding:28px;
border:1px solid rgba(255,255,255,0.05);
}

/* TOP */

.top{
display:flex;
align-items:flex-start;
gap:20px;
}

/* PFP */

.pfp{
width:90px;
height:90px;
border-radius:24px;
background:linear-gradient(135deg,#8b5cf6,#a855f7);
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
font-weight:bold;
}

/* INFO */

.player-name{
font-size:42px;
font-weight:bold;
}

.rank{
display:inline-block;
margin-top:10px;
background:#2a2a2a;
padding:8px 14px;
border-radius:16px;
font-size:13px;
color:#d1d1d1;
}

/* TAGS */

.tags{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:18px;
}

.tag{
background:#171717;
padding:10px 14px;
border-radius:18px;
font-size:13px;
color:#999;
display:flex;
align-items:center;
gap:7px;
}

/* MAIN STATS */

.main-stats{
display:flex;
justify-content:space-between;
margin-top:40px;
padding-bottom:25px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.stat-label{
font-size:12px;
color:#777;
letter-spacing:1px;
}

.stat-big{
font-size:52px;
font-weight:bold;
margin-top:6px;
}

/* PROGRESS */

.progress-section{
margin-top:24px;
}

.progress-top{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}

.progress-title{
font-size:12px;
color:#777;
letter-spacing:1px;
}

.progress-rank{
color:#4ade80;
font-weight:bold;
font-size:14px;
}

.progress-bar{
width:100%;
height:8px;
background:#222;
border-radius:999px;
overflow:hidden;
}

.progress-fill{
width:0%;
height:100%;
background:white;
border-radius:999px;
}

.progress-bottom{
display:flex;
justify-content:space-between;
margin-top:8px;
font-size:12px;
color:#777;
}

/* SHARE */

.share-btn{
margin-top:28px;
width:100%;
background:#111;
border:none;
padding:16px;
border-radius:18px;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
border:1px solid rgba(255,255,255,0.05);
}

/* TABS */

.tabs{
display:flex;
justify-content:space-around;
margin-top:30px;
padding-top:22px;
border-top:1px solid rgba(255,255,255,0.05);
}

.tab{
color:#777;
font-size:14px;
font-weight:bold;
}

.active-tab{
color:white;
}

/* STATS GRID */

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:24px;
}

.stat-box{
background:#111;
border-radius:24px;
padding:24px;
border:1px solid rgba(255,255,255,0.04);
}

.stat-small{
font-size:12px;
color:#777;
letter-spacing:1px;
}

.stat-number{
font-size:52px;
font-weight:bold;
margin-top:10px;
}

.stat-desc{
margin-top:10px;
font-size:13px;
color:#777;
}

/* MOBILE */

@media(max-width:768px){

.player-name{
font-size:34px;
}

.main-stats{
flex-direction:column;
gap:25px;
}

.stats-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="profile-card">

<!-- TOP -->
<div class="top">

<div class="pfp"
id="profilePic">
</div>

<div>

<div class="player-name"
id="playerName">
</div>

<div class="rank"
id="playerRank">
</div>

<div class="tags">

<div class="tag">
<i class="fa-solid fa-futbol"></i>
Player
</div>

<div class="tag">
<i class="fa-solid fa-location-dot"></i>
NA
</div>

<div class="tag">
<i class="fa-solid fa-flag"></i>
RPSG
</div>

</div>

</div>

</div>

<!-- MAIN STATS -->
<div class="main-stats">

<div>

<div class="stat-label">
POINTS
</div>

<div class="stat-big"
id="points">
0
</div>

</div>

<div>

<div class="stat-label">
MARKET VALUE
</div>

<div class="stat-big"
id="value">
£0
</div>

</div>

</div>

<!-- PROGRESS -->
<div class="progress-section">

<div class="progress-top">

<div class="progress-title">
RANK PROGRESS
</div>

<div class="progress-rank">
20 pts to Bronze II
</div>

</div>

<div class="progress-bar">

<div class="progress-fill"
id="progressFill">
</div>

</div>

<div class="progress-bottom">

<div>0 pts</div>

<div>20 pts</div>

</div>

</div>

<!-- SHARE -->
<button
class="share-btn"
onclick="copyLink()">

<i class="fa-solid fa-link"></i>
Copy link to this card

</button>

<!-- TABS -->
<div class="tabs">

<div class="tab active-tab">
Profile
</div>

<div class="tab">
Stats
</div>

<div class="tab">
Clips
</div>

<div class="tab">
Career
</div>

</div>

<!-- STATS -->
<div class="stats-grid">

<div class="stat-box">

<div class="stat-small">
GOALS
</div>

<div class="stat-number"
id="goals">
0
</div>

<div class="stat-desc">
0 G+A combined
</div>

</div>

<div class="stat-box">

<div class="stat-small">
ASSISTS
</div>

<div class="stat-number"
id="assists">
0
</div>

<div class="stat-desc">
0 ast/goal ratio
</div>

</div>

<div class="stat-box">

<div class="stat-small">
CLEAN SHEETS
</div>

<div class="stat-number"
id="cleansheets">
0
</div>

<div class="stat-desc">
0 matches
</div>

</div>

<div class="stat-box">

<div class="stat-small">
ALL-TIME PTS
</div>

<div class="stat-number"
id="blocks">
0
</div>

<div class="stat-desc">
RPSG career
</div>

</div>

</div>

</div>

<script src="players.js"></script>

<script>

const params =
new URLSearchParams(window.location.search);

const playerName =
decodeURIComponent(
params.get("name") || "Unknown"
);

const player =
players[playerName] || {

rank:"Bronze I",
points:0,
goals:0,
assists:0,
blocks:0,
cleansheets:0,
value:"£0"

};

document.getElementById("playerName")
.textContent = playerName;

document.getElementById("profilePic")
.textContent =
playerName.substring(0,2).toUpperCase();

document.getElementById("playerRank")
.textContent =
player.rank;

document.getElementById("points")
.textContent =
player.points;

document.getElementById("value")
.textContent =
player.value;

document.getElementById("goals")
.textContent =
player.goals;

document.getElementById("assists")
.textContent =
player.assists;

document.getElementById("blocks")
.textContent =
player.blocks;

document.getElementById("cleansheets")
.textContent =
player.cleansheets;

/* PROGRESS BAR */

let progress =
(player.points / 20) * 100;

document.getElementById("progressFill")
.style.width =
progress + "%";

/* SHARE */

function copyLink(){

navigator.clipboard.writeText(
window.location.href
);

alert("Profile link copied!");

}

</script>

</body>
</html>
