<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RPSG Player</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
padding:16px;
overflow-x:hidden;
}

/* BACK */

.back-btn{
display:inline-flex;
align-items:center;
gap:10px;
margin-bottom:18px;
color:#888;
text-decoration:none;
font-size:14px;
}

/* CARD */

.profile-card{
max-width:700px;
margin:auto;
background:#101010;
border-radius:32px;
padding:22px;
border:1px solid rgba(255,255,255,0.05);
}

/* TOP */

.top{
display:flex;
align-items:center;
gap:18px;
}

/* PFP */

.pfp{
width:82px;
height:82px;
border-radius:22px;
background:linear-gradient(135deg,#8b5cf6,#a855f7);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
}

/* INFO */

.player-name{
font-size:34px;
font-weight:bold;
line-height:1;
}

.rank{
display:inline-block;
margin-top:10px;
background:#222;
padding:7px 14px;
border-radius:14px;
font-size:12px;
color:#ccc;
}

/* TAGS */

.tags{
display:flex;
gap:8px;
margin-top:16px;
flex-wrap:wrap;
}

.tag{
background:#171717;
padding:9px 13px;
border-radius:16px;
font-size:12px;
color:#888;
display:flex;
align-items:center;
gap:6px;
}

/* QUICK STATS */

.quick-stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:24px;
}

.quick-box{
background:#0c0c0c;
padding:20px;
border-radius:22px;
text-align:center;
border:1px solid rgba(255,255,255,0.04);
}

.quick-number{
font-size:34px;
font-weight:bold;
}

.quick-label{
margin-top:6px;
font-size:12px;
color:#777;
letter-spacing:1px;
}

/* VALUE */

.value-card{
background:#0c0c0c;
padding:22px;
border-radius:22px;
margin-top:14px;
border:1px solid rgba(255,255,255,0.04);
}

.value-title{
font-size:12px;
color:#777;
letter-spacing:1px;
}

.value-number{
font-size:42px;
font-weight:bold;
margin-top:8px;
}

/* PROGRESS */

.progress-section{
margin-top:20px;
}

.progress-top{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.progress-title{
font-size:12px;
color:#777;
}

.progress-rank{
font-size:12px;
color:#4ade80;
font-weight:bold;
}

.progress-bar{
width:100%;
height:8px;
background:#222;
border-radius:999px;
overflow:hidden;
}

.progress-fill{
width:0%;
height:100%;
background:white;
border-radius:999px;
}

/* SHARE */

.share-btn{
margin-top:22px;
width:100%;
background:white;
color:black;
border:none;
padding:15px;
border-radius:18px;
font-weight:bold;
font-size:14px;
cursor:pointer;
}

/* EXTRA STATS */

.extra-stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:16px;
}

.extra-box{
background:#0c0c0c;
padding:20px;
border-radius:22px;
border:1px solid rgba(255,255,255,0.04);
}

.extra-title{
font-size:12px;
color:#777;
letter-spacing:1px;
}

.extra-number{
font-size:38px;
font-weight:bold;
margin-top:8px;
}

/* MOBILE */

@media(max-width:768px){

.player-name{
font-size:28px;
}

.pfp{
width:74px;
height:74px;
font-size:24px;
}

.quick-number{
font-size:30px;
}

.value-number{
font-size:34px;
}

.extra-number{
font-size:30px;
}

}

</style>

</head>

<body>

<a href="index.html"
class="back-btn">

<i class="fa-solid fa-arrow-left"></i>
Back

</a>

<div class="profile-card">

<!-- TOP -->
<div class="top">

<div class="pfp"
id="profilePic">
</div>

<div>

<div class="player-name"
id="playerName">
Loading...
</div>

<div class="rank"
id="playerRank">
Bronze I
</div>

<div class="tags">

<div class="tag">
<i class="fa-solid fa-futbol"></i>
Player
</div>

<div class="tag">
<i class="fa-solid fa-location-dot"></i>
NA
</div>

<div class="tag">
<i class="fa-solid fa-trophy"></i>
RPSG
</div>

</div>

</div>

</div>

<!-- QUICK STATS -->
<div class="quick-stats">

<div class="quick-box">

<div class="quick-number"
id="points">
0
</div>

<div class="quick-label">
PTS
</div>

</div>

<div class="quick-box">

<div class="quick-number"
id="goals">
0
</div>

<div class="quick-label">
GOALS
</div>

</div>

<div class="quick-box">

<div class="quick-number"
id="assists">
0
</div>

<div class="quick-label">
ASSISTS
</div>

</div>

<div class="quick-box">

<div class="quick-number"
id="cleansheets">
0
</div>

<div class="quick-label">
CLEAN SHEETS
</div>

</div>

</div>

<!-- VALUE -->
<div class="value-card">

<div class="value-title">
MARKET VALUE
</div>

<div class="value-number"
id="value">
£0
</div>

</div>

<!-- PROGRESS -->
<div class="progress-section">

<div class="progress-top">

<div class="progress-title">
RANK PROGRESS
</div>

<div class="progress-rank">
20 pts to Bronze II
</div>

</div>

<div class="progress-bar">

<div class="progress-fill"
id="progressFill">
</div>

</div>

</div>

<!-- SHARE -->
<button
class="share-btn"
onclick="copyLink()">

<i class="fa-solid fa-link"></i>
Copy Profile Link

</button>

<!-- EXTRA -->
<div class="extra-stats">

<div class="extra-box">

<div class="extra-title">
BLOCKS
</div>

<div class="extra-number"
id="blocks">
0
</div>

</div>

<div class="extra-box">

<div class="extra-title">
ALL-TIME PTS
</div>

<div class="extra-number"
id="alltime">
0
</div>

</div>

</div>

</div>

<script src="players.js"></script>

<script>

/* URL */

const params =
new URLSearchParams(window.location.search);

const playerName =
decodeURIComponent(
params.get("name") || "Unknown"
);

/* DATA */

const player =
players[playerName] || {

rank:"Bronze I",
position:"Player",
points:0,
goals:0,
assists:0,
blocks:0,
cleansheets:0,
value:"£0"

};

/* LOAD */

document.getElementById("playerName")
.textContent = playerName;

document.getElementById("profilePic")
.textContent =
playerName.substring(0,2).toUpperCase();

document.getElementById("playerRank")
.textContent =
player.rank;

document.getElementById("points")
.textContent =
player.points;

document.getElementById("goals")
.textContent =
player.goals;

document.getElementById("assists")
.textContent =
player.assists;

document.getElementById("cleansheets")
.textContent =
player.cleansheets;

document.getElementById("blocks")
.textContent =
player.blocks;

document.getElementById("alltime")
.textContent =
player.points;

document.getElementById("value")
.textContent =
player.value;

/* PROGRESS */

let progress =
(player.points / 20) * 100;

document.getElementById("progressFill")
.style.width =
progress + "%";

/* SHARE */

function copyLink(){

navigator.clipboard.writeText(
window.location.href
);

alert("Profile link copied!");

}

</script>

</body>
</html>
