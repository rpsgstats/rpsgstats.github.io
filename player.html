<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Player Profile</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
padding:20px;
overflow-x:hidden;
}

/* BACK BUTTON */

.back-btn{
display:inline-flex;
align-items:center;
gap:10px;
margin-bottom:25px;
color:#888;
text-decoration:none;
font-size:15px;
}

/* MAIN CARD */

.profile-card{
background:#111;
border:1px solid rgba(255,255,255,0.06);
border-radius:36px;
padding:30px;
max-width:750px;
margin:auto;
box-shadow:0 0 30px rgba(255,255,255,0.03);
}

/* TOP */

.top-profile{
display:flex;
align-items:center;
gap:22px;
flex-wrap:wrap;
}

/* PROFILE PICTURE */

.profile-pic{
width:110px;
height:110px;
border-radius:28px;
background:linear-gradient(135deg,#2a2a2a,#111);
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
font-weight:bold;
}

/* NAME */

.big-name{
font-size:48px;
font-weight:bold;
line-height:1;
}

/* RANK */

.player-rank{
margin-top:12px;
display:inline-block;
background:#2a2a2a;
padding:9px 16px;
border-radius:18px;
color:#d8ab6d;
font-size:14px;
font-weight:bold;
}

/* SHARE BUTTON */

.share-btn{
margin-top:18px;
background:white;
color:black;
border:none;
padding:13px 18px;
border-radius:18px;
font-weight:bold;
font-size:14px;
cursor:pointer;
transition:0.3s;
}

.share-btn:hover{
transform:translateY(-3px);
}

/* TAGS */

.tags{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:28px;
}

.tag{
background:#171717;
padding:10px 15px;
border-radius:18px;
font-size:13px;
color:#aaa;
display:flex;
align-items:center;
gap:8px;
}

/* MAIN STATS */

.main-stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:30px;
}

.big-stat-card{
background:#0c0c0c;
padding:26px;
border-radius:26px;
}

.stat-title{
color:#777;
font-size:13px;
}

.big-number{
font-size:46px;
font-weight:bold;
margin-top:8px;
}

/* SMALL STATS */

.small-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

.small-card{
background:#0c0c0c;
padding:24px;
border-radius:24px;
}

.small-title{
color:#777;
font-size:13px;
}

.small-number{
font-size:42px;
font-weight:bold;
margin-top:8px;
}

/* MOBILE */

@media(max-width:768px){

.profile-card{
padding:24px;
}

.big-name{
font-size:34px;
}

.main-stats{
grid-template-columns:1fr;
}

.small-grid{
grid-template-columns:1fr;
}

.profile-pic{
width:90px;
height:90px;
font-size:28px;
}

}

</style>

</head>

<body>

<a href="index.html"
class="back-btn">

<i class="fa-solid fa-arrow-left"></i>
Back

</a>

<div class="profile-card">

<!-- TOP -->
<div class="top-profile">

<div class="profile-pic"
id="profilePic">
</div>

<div>

<div class="big-name"
id="playerName">
</div>

<div class="player-rank"
id="playerRank">
</div>

<button
class="share-btn"
onclick="copyLink()">

<i class="fa-solid fa-link"></i>
Copy Profile Link

</button>

</div>

</div>

<!-- TAGS -->
<div class="tags">

<div class="tag">
<i class="fa-solid fa-futbol"></i>
Player
</div>

<div class="tag">
<i class="fa-solid fa-earth-americas"></i>
NA
</div>

<div class="tag">
<i class="fa-solid fa-trophy"></i>
RPSG
</div>

</div>

<!-- BIG STATS -->
<div class="main-stats">

<div class="big-stat-card">

<div class="stat-title">
POINTS
</div>

<div class="big-number"
id="points">
</div>

</div>

<div class="big-stat-card">

<div class="stat-title">
MARKET VALUE
</div>

<div class="big-number"
id="value">
</div>

</div>

</div>

<!-- SMALL STATS -->
<div class="small-grid">

<div class="small-card">

<div class="small-title">
GOALS
</div>

<div class="small-number"
id="goals">
</div>

</div>

<div class="small-card">

<div class="small-title">
ASSISTS
</div>

<div class="small-number"
id="assists">
</div>

</div>

<div class="small-card">

<div class="small-title">
BLOCKS
</div>

<div class="small-number"
id="blocks">
</div>

</div>

<div class="small-card">

<div class="small-title">
CLEAN SHEETS
</div>

<div class="small-number"
id="cleansheets">
</div>

</div>

</div>

</div>

<script src="players.js"></script>

<script>

const params =
new URLSearchParams(window.location.search);

const playerName =
params.get("name");

const player =
players[playerName];

document.getElementById("playerName")
.innerText = playerName;

document.getElementById("profilePic")
.innerText =
playerName.substring(0,2).toUpperCase();

document.getElementById("playerRank")
.innerText = player.rank;

document.getElementById("points")
.innerText = player.points;

document.getElementById("value")
.innerText = player.value;

document.getElementById("goals")
.innerText = player.goals;

document.getElementById("assists")
.innerText = player.assists;

document.getElementById("blocks")
.innerText = player.blocks;

document.getElementById("cleansheets")
.innerText = player.cleansheets;

function copyLink(){

navigator.clipboard.writeText(
window.location.href
);

alert("Profile link copied!");

}

</script>

</body>
</html>
